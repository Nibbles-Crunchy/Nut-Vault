<!DOCTYPE html><html lang="en-GB"><head> <meta charset="UTF-8"> <title>The Nut Vault | Tactical Burrow</title> <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐹</text></svg>"> <style> :root { --p: #ffcc33; --s: #8b4513; --a: #ff4757; --bg: #1a1a1a; --path: #d4a373; --gold: #ffd700; --grass: #2d5a27; } body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; } /* Auth & Overlays */ #auth-overlay { position: fixed; inset: 0; background: var(--p); display: flex; align-items: center; justify-content: center; z-index: 2000; transition: 0.5s; } .login-card { background: #fff; color: var(--s); padding: 3rem; border-radius: 40px; border: 8px solid var(--s); text-align: center; box-shadow: 0 20px 0 rgba(0,0,0,0.3); } #game-over { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 3000; opacity: 0; pointer-events: none; transition: 0.5s; } #game-over.active { opacity: 1; pointer-events: auto; } #scare-img { width: 100%; height: 100%; object-fit: cover; position: absolute; opacity: 0; transition: 0.1s; } header { width: 100%; background: var(--s); color: var(--p); padding: 1rem; display: flex; justify-content: space-around; border-bottom: 5px solid var(--p); position: sticky; top: 0; z-index: 1000; box-sizing: border-box; font-weight: bold; } .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; width: 95%; max-width: 1300px; } .card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 20px; border: 2px solid var(--p); text-align: center; transition: 0.3s; } .card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.1); } #game { border: 8px solid #333; border-radius: 15px; cursor: crosshair; background: var(--grass); box-shadow: 0 10px 30px rgba(0,0,0,0.5); image-rendering: pixelated; } /* UI Elements */ .inv-slot { display: inline-block; padding: 10px; border: 3px solid #555; border-radius: 12px; margin: 5px; cursor: pointer; background: rgba(0,0,0,0.3); transition: 0.2s; font-size: 1.5rem; } .inv-slot.selected { border-color: var(--gold); background: rgba(255,204,51,0.3); transform: scale(1.1); box-shadow: 0 0 15px var(--p); } .wheel-area { font-size: 55px; transition: transform 0.1s; margin: 10px; display: inline-block; cursor: default; user-select: none; } .charged { filter: drop-shadow(0 0 20px var(--gold)); animation: pulse 0.5s infinite alternate; } @keyframes pulse { from { transform: scale(1.1); } to { transform: scale(1.3); } } .progress-container { width: 80%; background: #333; height: 14px; border-radius: 10px; margin: 10px auto; overflow: hidden; border: 2px solid var(--p); } #progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, var(--p), #fff, var(--gold)); transition: width 0.15s ease; } button { background: var(--a); color: white; border: none; padding: 10px 18px; border-radius: 50px; cursor: pointer; font-weight: bold; margin: 5px; transition: 0.2s; text-transform: uppercase; font-size: 0.8rem; } button:hover { filter: brightness(1.2); transform: scale(1.05); } button:active { transform: scale(0.95); } .hidden { display: none !important; } #badge-display { font-size: 0.8rem; margin-top: 8px; color: var(--gold); font-weight: bold; height: 20px; } .hotkey { font-size: 0.6rem; display: block; opacity: 0.7; margin-top: 4px; } </style></head><body> <div id="auth-overlay"> <div class="login-card"> <h1>🐹 The Nut Vault</h1> <p>Tactical Burrow Defense</p> <input type="text" id="uIn" placeholder="Commander Name" style="padding:12px; margin:5px; border-radius:10px; border:2px solid #ccc;"><br> <input type="password" id="pIn" placeholder="Access Code" style="padding:12px; margin:5px; border-radius:10px; border:2px solid #ccc;"><br> <button onclick="login()" style="padding: 15px 30px; font-size: 1rem;">Enter Burrow</button> </div> </div> <div id="game-over"> <img id="scare-img" src="jumpscare.webp"> <h1 style="color:red; z-index:10; font-size: 4rem; text-shadow: 0 0 20px black;">BURROW BREACHED</h1> <button onclick="location.reload()" style="z-index:10; padding: 20px 40px; font-size: 1.5rem;">RETRY DEFENSE</button> </div> <header> <div>💰 <span id="bal">0</span> NB</div> <div id="hp-stat">❤️ HP: <span id="hp">100</span></div> <div>🌊 Wave: <span id="wv">1</span> <span id="nib-badge" style="margin-left:10px; color:var(--gold)"></span></div> <button onclick="cloudSave()" style="background:#2ecc71; font-size:0.7rem">☁️ MANUAL SYNC</button> </header> <div class="dashboard"> <div class="card"> <h3>🏦 Bank</h3> <button onclick="bank('dep')">Deposit 50</button> <button onclick="bank('bor')" style="background:orange">Borrow 100</button> <p>Debt: <span id="debt" style="color:var(--a)">0</span> NB</p> <span style="font-size:0.6rem; opacity:0.6">Warning: High Interest</span> </div> <div class="card"> <h3>🛒 Store</h3> <button onclick="buy('turret', 50)" title="Rapid fire sunflower">🌻 Turret (50)</button> <button onclick="buy('sniper', 150)" title="Long range acorn launcher">🏹 Sniper (150)</button> <div id="pouch" style="margin-top:10px; min-height: 60px;"></div> <span style="font-size:0.6rem; opacity:0.6">Keys 1-9 to select</span> </div> <div class="card"> <h3>🎡 Exercise</h3> <div id="wheel" class="wheel-area">🎡</div> <div class="progress-container"><div id="progress-fill"></div></div> <div id="badge-display"></div> <span style="font-size:0.6rem; opacity:0.6">Mash [SPACE] for Cash & Nuke</span> </div> <div class="card"> <h3>🏆 Global</h3> <ul id="leaderboard-list" style="list-style:none; padding:0; font-size:0.85em; text-align: left;"></ul> </div> </div> <div style="margin-bottom: 10px;"> <button onclick="startWave()" id="wbtn" style="background:#2ecc71; width: 300px; font-size: 1.2rem; padding: 15px;">🚀 LAUNCH WAVE</button> <div id="nuke-msg" style="color:var(--gold); font-weight:bold; text-align:center; visibility:hidden;">[Q] NUKE READY!</div> </div> <canvas id="game" width="640" height="320"></canvas><script> const USERS = { "Pipsqueak": "carrot123", "Nibbles": "password" }; let user = "", data = { bal: 500, wave: 1, inv: [], hp: 100, debt: 0, rewards: [] }; let towers = [], enemies = [], bullets = [], waveActive = false; let selectedIdx = -1, mousePos = {x:0, y:0}, wheelBoost = 0, nukeReady = false, cheeseActive = 0; const SIZE = 32, PATH = [{x:0,y:2},{x:1,y:2},{x:2,y:2},{x:3,y:2},{x:4,y:2},{x:5,y:2},{x:5,y:3},{x:5,y:4},{x:6,y:4},{x:7,y:4},{x:8,y:4},{x:9,y:4},{x:10,y:4},{x:10,y:3},{x:10,y:2},{x:10,y:1},{x:11,y:1},{x:12,y:1},{x:13,y:1},{x:14,y:1},{x:15,y:1},{x:15,y:2},{x:15,y:3},{x:15,y:4},{x:16,y:4},{x:17,y:4},{x:18,y:4},{x:19,y:4}]; function login() { const u = document.getElementById('uIn').value; const p = document.getElementById('pIn').value; if (USERS[u] === p) { user = u; const saved = localStorage.getItem("nut_vault_v2_" + user); if (saved) { const parsed = JSON.parse(saved); data = parsed.d; towers = parsed.t || []; } if (user === "Nibbles") document.getElementById('nib-badge').innerText = "⭐ Founder"; document.getElementById('auth-overlay').style.opacity = '0'; setTimeout(() => document.getElementById('auth-overlay').classList.add('hidden'), 500); updateUI(); updateLeaderboard(); gameLoop(); // Add interest interval setInterval(() => { if (data.debt > 0) { data.debt = Math.floor(data.debt * 1.02); // 2% interest updateUI(); } }, 10000); } else { alert("Access Denied: Burrow key incorrect."); } } function cloudSave() { localStorage.setItem("nut_vault_v2_" + user, JSON.stringify({d: data, t: towers})); const btn = event.target; btn.innerText = "✅ SYNCED"; setTimeout(() => btn.innerText = "☁️ MANUAL SYNC", 2000); } function updateUI() { document.getElementById('bal').innerText = Math.floor(data.bal); document.getElementById('hp').innerText = data.hp; document.getElementById('debt').innerText = data.debt; document.getElementById('wv').innerText = data.wave; let rewardText = ""; if(data.rewards.includes('boots')) rewardText += "👟 Speed Boots "; if(data.rewards.includes('cheese')) rewardText += "🧀 Stinky Cheese [E] "; document.getElementById('badge-display').innerText = rewardText; const pouch = document.getElementById('pouch'); pouch.innerHTML = ""; data.inv.forEach((it, i) => { let b = document.createElement('div'); b.className = `inv-slot ${selectedIdx === i ? 'selected' : ''}`; b.innerHTML = (it === 'turret' ? "🌻" : "🏹") + `<span class="hotkey">${i+1}</span>`; b.onclick = () => { selectedIdx = i; updateUI(); }; pouch.appendChild(b); }); if(data.hp <= 0) { document.getElementById('game-over').classList.add('active'); setTimeout(()=>document.getElementById('scare-img').style.opacity=1, 800); } document.getElementById('nuke-msg').style.visibility = nukeReady ? "visible" : "hidden"; } window.addEventListener('keydown', (e) => { if (!user) return; // Exercise Wheel [Space] if (e.code === 'Space') { e.preventDefault(); let boostAmt = data.rewards.includes('boots') ? 12 : 8; wheelBoost = Math.min(wheelBoost + boostAmt, 100); data.bal += 0.5; updateUI(); // Visual Shake const w = document.getElementById('wheel'); w.style.transform = `rotate(${Math.random()*20-10}deg) scale(${1 + wheelBoost/200})`; document.getElementById('progress-fill').style.width = wheelBoost + "%"; if(wheelBoost >= 100) { nukeReady = true; document.getElementById('wheel').classList.add('charged'); updateUI(); } clearTimeout(window.wT); window.wT = setTimeout(() => { if(!nukeReady){ wheelBoost=0; document.getElementById('progress-fill').style.width="0%"; document.getElementById('wheel').style.transform = "rotate(0deg) scale(1)"; } }, 1000); } // Hotkeys 1-9 for inventory if (e.key >= '1' && e.key <= '9') { let idx = parseInt(e.key) - 1; if (data.inv[idx]) { selectedIdx = idx; updateUI(); } } // Nuke [Q] if (e.code === 'KeyQ' && nukeReady) { enemies.forEach(en => en.hp -= 800); nukeReady = false; wheelBoost = 0; document.getElementById('wheel').classList.remove('charged'); document.getElementById('progress-fill').style.width = "0%"; bullets.push({ x: 320, y: 160, life: 30, nuke: true }); updateUI(); } // Cheese Distraction [E] if (e.code === 'KeyE' && data.rewards.includes('cheese') && cheeseActive <= 0) { cheeseActive = 300; // Longer duration } }); const canvas = document.getElementById('game'), ctx = canvas.getContext('2d'); canvas.onmousemove = (e) => { const r = canvas.getBoundingClientRect(); mousePos = { x: e.clientX - r.left, y: e.clientY - r.top }; }; canvas.onclick = () => { const tx = Math.floor(mousePos.x/SIZE), ty = Math.floor(mousePos.y/SIZE); if (selectedIdx !== -1 && !PATH.some(p => p.x === tx && p.y === ty)) { // Check for overlaps with existing towers if (!towers.some(t => t.x === tx*SIZE && t.y === ty*SIZE)) { towers.push({ x: tx*SIZE, y: ty*SIZE, type: data.inv[selectedIdx], cd: 0, dmg: (data.inv[selectedIdx]==='sniper'?100:25), range: (data.inv[selectedIdx]==='sniper'?250:120) }); data.inv.splice(selectedIdx, 1); selectedIdx = -1; updateUI(); } } }; function startWave() { if (waveActive || data.hp <= 0) return; waveActive = true; let isBoss = data.wave % 10 === 0; let count = isBoss ? 1 : 5 + Math.floor(data.wave/1.5); let t = setInterval(() => { let hp = (isBoss ? 2000 : 45) * Math.pow(1.25, data.wave-1); enemies.push({ pi: 0, x: PATH[0].x*SIZE, y: PATH[0].y*SIZE, hp: hp, max: hp, spd: (isBoss?0.5:1.2 + (data.wave*0.05)), icon: isBoss?"👑":"🐁", bob:0, isBoss }); if (--count <= 0) clearInterval(t); }, 800); } function gameLoop() { if(data.hp <= 0) return; // Draw Background ctx.fillStyle = "#2d5a27"; ctx.fillRect(0,0,640,320); // Draw Path ctx.fillStyle = "rgba(212, 163, 115, 0.8)"; PATH.forEach(p => ctx.fillRect(p.x*SIZE, p.y*SIZE, SIZE, SIZE)); // Tower Range Preview if (selectedIdx !== -1) { ctx.beginPath(); ctx.arc(mousePos.x, mousePos.y, data.inv[selectedIdx] === 'sniper' ? 250 : 120, 0, Math.PI*2); ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fill(); } if(cheeseActive > 0) { ctx.font="40px Arial"; ctx.fillText("🧀", 300, 60); ctx.strokeStyle = "yellow"; ctx.strokeRect(290, 20, 60, 60); cheeseActive--; } // Towers Logic towers.forEach(t => { ctx.font = "24px Arial"; ctx.fillText(t.type === 'turret' ? "🌻" : "🏹", t.x+4, t.y+24); enemies.forEach(en => { let d = Math.hypot((en.x+16)-(t.x+16), (en.y+16)-(t.y+16)); if (d < t.range && Date.now() - t.cd > (t.type==='sniper'?1500:600)) { bullets.push({ x: t.x+16, y: t.y+16, tx: en.x+16, ty: en.y+16, life: 8, color: t.type==='sniper'?'#ff4757':'#fff' }); en.hp -= t.dmg; t.cd = Date.now(); } }); }); // Bullets Logic bullets.forEach((b, i) => { if(b.nuke) { ctx.beginPath(); ctx.arc(320, 160, (30-b.life)*35, 0, Math.PI*2); ctx.strokeStyle=`rgba(255, 165, 0, ${b.life/30})`; ctx.lineWidth = 5; ctx.stroke(); } else { ctx.strokeStyle = b.color; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(b.x, b.y); ctx.lineTo(b.tx, b.ty); ctx.stroke(); } if (--b.life <= 0) bullets.splice(i, 1);if (cheeseActive <= 0) { 
    // normal movement logic 
} else { 
    en.x += Math.random() - 0.5; // jitter
