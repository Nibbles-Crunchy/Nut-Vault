<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <title>Squirrel Defense: Final Edition</title>
    <style>
        :root { --p: #ffcc00; --s: #4a2c1d; --g: #2d5a27; }
        body { background: #111; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; }
        #ui { width: 1280px; display: flex; justify-content: space-around; align-items: center; padding: 15px; background: var(--s); border-bottom: 4px solid var(--p); }
        canvas { border: 5px solid #333; background: var(--g); cursor: crosshair; }
        .stat { font-size: 1.2rem; font-weight: bold; }
        .controls { font-size: 0.9rem; color: #ddd; }
        kbd { background: #333; color: var(--p); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--p); }
        #shop { position: absolute; left: 20px; top: 100px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 2px solid var(--p); }
        .shop-item { margin-bottom: 10px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id='ui'>
    <div class='stat'>🌰 <span id='bal'>200</span></div>
    <div class='stat'>❤️ <span id='hp'>100</span></div>
    <div class='stat'>🌊 Wave <span id='wave'>1</span></div>
    <div class='controls'>
        [<kbd>1</kbd>-<kbd>3</kbd>] Towers | [<kbd>R</kbd>/<kbd>T</kbd>] Stash | [<kbd>SPACE</kbd>] Super Nut | [<kbd>F</kbd>] Speed 
    </div>
</div>

<div id='shop'>
    <div class='shop-item'><kbd>1</kbd> Slinger: 50</div>
    <div class='shop-item'><kbd>2</kbd> Sniper: 120</div>
    <div class='shop-item'><kbd>3</kbd> Bomber: 200</div>
    <div class='shop-item'><kbd>SPACE</kbd> Mega Blast: 500</div>
</div>

<canvas id='game'></canvas>

<script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 1280; canvas.height = 640;
    const SIZE = 64;

    let data = { bal: 200, hp: 100, wave: 1, speed: 1 };
    let enemies = [], stashes = [], turrets = [], bullets = [], popups = [];
    let mousePos = { x: 0, y: 0 };
    let waveTimer = 0, toSpawn = 5;

    const PATH = [
        {x:0,y:3}, {x:1,y:3}, {x:2,y:3}, {x:3,y:3}, {x:4,y:3}, {x:4,y:4}, {x:4,y:5}, 
        {x:5,y:5}, {x:6,y:5}, {x:7,y:5}, {x:8,y:5}, {x:8,y:4}, {x:8,y:3}, {x:8,y:2},
        {x:9,y:2}, {x:10,y:2}, {x:11,y:2}, {x:12,y:2}, {x:13,y:2}, {x:14,y:2}, {x:15,y:2}
    ];

    canvas.onmousemove = e => {
        const r = canvas.getBoundingClientRect();
        mousePos = { x: e.clientX - r.left, y: e.clientY - r.top };
    };

    window.onkeydown = e => {
        const tx = Math.floor(mousePos.x/SIZE)*SIZE;
        const ty = Math.floor(mousePos.y/SIZE)*SIZE;
        const onPath = PATH.some(p => p.x*SIZE === tx && p.y*SIZE === ty);

        if (e.key === 'f') data.speed = data.speed === 1 ? 2.5 : 1;
        
        if (e.code === 'Space' && data.bal >= 500) {
            data.bal -= 500;
            enemies.forEach(en => { en.hp -= 500; addPopup('BOOM!', en.x, en.y, 'red'); });
        }

        if (!onPath) {
            if (e.key === '1' && data.bal >= 50) { data.bal -= 50; turrets.push({x:tx+32, y:ty+32, type:'basic', cd:0, range:200}); }
            if (e.key === '2' && data.bal >= 120) { data.bal -= 120; turrets.push({x:tx+32, y:ty+32, type:'sniper', cd:0, range:500}); }
            if (e.key === '3' && data.bal >= 200) { data.bal -= 200; turrets.push({x:tx+32, y:ty+32, type:'bomb', cd:0, range:150}); }
        } else {
            if (e.key === 'r' && data.bal >= 30) { data.bal -= 30; stashes.push({x:tx, y:ty, hp:100, m:100, icon:'🥜', s:0.2}); }
            if (e.key === 't' && data.bal >= 60) { data.bal -= 60; stashes.push({x:tx, y:ty, hp:400, m:400, icon:'🍯', s:0.05}); }
        }
        updateUI();
    };

    function updateUI() {
        document.getElementById('bal').innerText = Math.floor(data.bal);
        document.getElementById('hp').innerText = data.hp;
        document.getElementById('wave').innerText = data.wave;
    }

    function addPopup(txt, x, y, c='#ffcc00') {
        popups.push({ txt, x, y, a: 1, l: 50, c });
    }

    function loop() {
        if (data.hp <= 0) { ctx.fillStyle='red'; ctx.font='80px Arial'; ctx.fillText('GAME OVER', 400, 320); return; }
        for(let i=0; i<data.speed; i++) update();
        draw();
        requestAnimationFrame(loop);
    }

    function update() {
        waveTimer++;
        if (waveTimer > 80 && toSpawn > 0) {
            const isBoss = toSpawn === 1 && data.wave % 3 === 0;
            enemies.push({ x: -SIZE, y: 3*SIZE, hp: (isBoss?800:60)*data.wave, max: (isBoss?800:60)*data.wave, boss: isBoss, spd: isBoss?0.5:1.5, p:0, icon: isBoss?'👑':'🚀' });
            toSpawn--; waveTimer = 0;
        }
        if (enemies.length === 0 && toSpawn === 0) { data.wave++; toSpawn = 5+data.wave; addPopup('WAVE '+data.wave, 600, 300, 'white'); }

        turrets.forEach(t => {
            t.cd--;
            const target = enemies.find(e => Math.hypot(e.x-t.x, e.y-t.y) < t.range);
            if (target && t.cd <= 0) {
                bullets.push({ x: t.x, y: t.y, target, type: t.type });
                t.cd = t.type === 'sniper' ? 100 : (t.type === 'bomb' ? 80 : 30);
            }
        });

        bullets.forEach((b, i) => {
            const ang = Math.atan2(b.target.y+32-b.y, b.target.x+32-b.x);
            b.x += Math.cos(ang)*8; b.y += Math.sin(ang)*8;
            if (Math.hypot(b.target.x+32-b.x, b.target.y+32-b.y) < 15) {
                if (b.type === 'bomb') {
                    enemies.forEach(e => { if(Math.hypot(e.x-b.x, e.y-b.y) < 100) e.hp -= 40; });
                } else { b.target.hp -= b.type === 'sniper' ? 150 : 25; }
                bullets.splice(i, 1);
            }
        });

        stashes = stashes.filter(s => s.hp > 0);
        enemies.forEach((en, i) => {
            const st = stashes.find(s => Math.hypot(s.x+32-(en.x+32), s.y+32-(en.y+32)) < 30);
            let s = en.spd; if (st) { st.hp -= en.boss?2:0.5; s *= st.s; }
            const tar = PATH[en.p];
            if (tar) {
                if (en.x < tar.x*SIZE) en.x += s; if (en.y < tar.y*SIZE) en.y += s;
                if (Math.hypot(en.x-tar.x*SIZE, en.y-tar.y*SIZE) < 5) en.p++;
            } else { data.hp -= en.boss?30:5; enemies.splice(i, 1); updateUI(); }
            if (en.hp <= 0) {
                const r = en.boss?300:20; data.bal += r; addPopup('+'+r, en.x, en.y);
                enemies.splice(i, 1); updateUI();
            }
        });

        popups.forEach((p, i) => { p.y--; p.l--; p.a -= 0.02; if(p.l<=0) popups.splice(i,1); });
    }

    function draw() {
        ctx.fillStyle = '#2d5a27'; ctx.fillRect(0,0,1280,640);
        ctx.fillStyle = 'rgba(212,163,115,0.4)';
        PATH.forEach(p => ctx.fillRect(p.x*SIZE, p.y*SIZE, SIZE, SIZE));
        
        stashes.forEach(s => {
            ctx.font = '40px Arial'; ctx.fillText(s.icon, s.x+10, s.y+45);
            ctx.fillStyle='red'; ctx.fillRect(s.x+8, s.y+52, 48, 4);
            ctx.fillStyle='lime'; ctx.fillRect(s.x+8, s.y+52, (s.hp/s.m)*48, 4);
        });

        turrets.forEach(t => {
            ctx.font = '45px Arial'; 
            let icon = '🐿️'; if(t.type==='sniper') icon='🎯'; if(t.type==='bomb') icon='💣';
            ctx.fillText(icon, t.x-22, t.y+15);
        });

        enemies.forEach(en => {
            ctx.font = en.boss ? '60px Arial' : '40px Arial';
            ctx.fillText(en.icon, en.x+8, en.y+48);
        });

        bullets.forEach(b => {
            ctx.fillStyle = b.type==='bomb'?'orange':'yellow';
            ctx.beginPath(); ctx.arc(b.x, b.y, b.type==='bomb'?8:4, 0, 7); ctx.fill();
        });

        popups.forEach(p => {
            ctx.fillStyle = `rgba(${p.c==='red'?'255,0,0':(p.c==='white'?'255,255,255':'255,204,0')}, ${p.a})`;
            ctx.font = 'bold 24px Arial'; ctx.fillText(p.txt, p.x, p.y);
        });
    }

    loop();
</script>
</body>
</html>
